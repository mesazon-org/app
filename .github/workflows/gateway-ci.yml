name: Gateway CI
on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - 'frontend/**'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'frontend/**'
jobs:
  gateway-build:
    uses: ./.github/workflows/scala-build-and-upload-image.yml
    secrets: inherit # Inherit secrets from the parent workflow https://stackoverflow.com/questions/66113900/github-actions-not-receiving-secrets
    with:
      module: "gateway"
      image-name: "mesazon-gateway-core"
  gateway-publish:
    needs: [ "gateway-build" ]
    uses: ./.github/workflows/download-and-publish-image.yml
    secrets: inherit # Inherit secrets from the parent workflow https://stackoverflow.com/questions/66113900/github-actions-not-receiving-secrets
    with:
      image-name: ${{ needs.gateway-build.outputs.image-name }}
      image-tag: ${{ needs.gateway-build.outputs.image-tag }}
  gateway-deploy-dev-plan:
    needs: [ "gateway-publish" ]
    uses: mesazon-org/mesazon-tf-do/.github/workflows/tf-plan.yml@main
    secrets: inherit # Inherit secrets from the parent workflow https://stackoverflow.com/questions/66113900/github-actions-not-receiving-secrets
    with:
      project-id: "8a8c246e-2057-46b7-a01a-04cbbbf0b8d9"
      working-directory: "terraform/environments/dev"
      module: "gateway-deploy-dev-plan"
  gateway-deploy-dev-apply:
    needs: [ "gateway-deploy-dev-plan" ]
    uses: mesazon-org/mesazon-tf-do/.github/workflows/tf-apply.yml@main
    secrets: inherit # Inherit secrets from the parent workflow https://stackoverflow.com/questions/66113900/github-actions-not-receiving-secrets
    with:
      project-id: "8a8c246e-2057-46b7-a01a-04cbbbf0b8d9"
      working-directory: "terraform/environments/dev"
      module: "gateway-deploy-dev-apply"
