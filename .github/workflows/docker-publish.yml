name: scala-publish
on:
  workflow_call:
    inputs:
      image-name:
        description: "Module name"
        type: string
        required: true
env:
  DOCKER_REPOSITORY: ${{ vars.DOCKER_REPOSITORY }}
  DOCKER_IMAGE_NAME: ${{ inputs.image-name }}
jobs:
  build:
    environment: docker-publish-approval
    name: Build ${{ inputs.module }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set Git Based Tags
        id: vars
        run: |
          RAW_SHA=$(git rev-parse --short HEAD)
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            TAG="pr-${{ github.event.pull_request.number }}-$RAW_SHA"
          else
            TAG="main-$RAW_SHA"
          fi
          echo "DOCKER_IMAGE_TAG=$TAG" >> $GITHUB_ENV
      - name: Download image
        uses: ishworkh/container-image-artifact-download@v2.0.0
        with:
          image: "$DOCKER_REPOSITORY/${{ inputs.image-name }}:$DOCKER_IMAGE_TAG"
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_KEY }}
      - name: Log in to DigitalOcean Container Registry with short-lived credentials
        run: doctl registry login --expiry-seconds 600
      - name: Build ${{ inputs.module }}-publish
        run: docker push $DOCKER_REPOSITORY/${{ inputs.image-name }}:$DOCKER_IMAGE_TAG
