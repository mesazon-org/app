name: publish-image
on:
  workflow_call:
    inputs:
      image-name:
        description: "Image name"
        type: string
        required: true
      image-tag:
        description: "Image tag"
        type: string
        required: true
env:
  DOCKER_IMAGE: ${{ vars.DOCKER_REPOSITORY }}/${{ inputs.image-name }}:${{ inputs.image-tag }}
jobs:
  build:
    environment: docker-publish-approval
    name: Publish ${{ inputs.image-name }}:${{ inputs.image-tag }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Download image
        uses: ishworkh/container-image-artifact-download@v2.0.0
        with:
          image: ${{ env.DOCKER_IMAGE }}
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_KEY }}
      - name: Log in to DigitalOcean Container Registry with short-lived credentials
        run: doctl registry login --expiry-seconds 600
      - name: Build ${{ inputs.module }}-publish
        run: docker push $DOCKER_IMAGE
