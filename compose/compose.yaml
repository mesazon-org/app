services:
  gateway:
    image: local/gateway-core:latest
    restart: always
    ports:
      - "8080:8080" # External
      - "8081:8081" # Internal
      - "8082:8082" # Health
      - "8083:8083" # Docs
    environment:
      LOG_LEVEL: INFO
      DATABASE_NAME: local_db
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USERNAME: local_user
      DATABASE_PASSWORD: local_password
      SERVER_ENABLE_DOCS: "true"
      EMAIL_PROVIDER_HOST: mailhog
      EMAIL_PROVIDER_PORT: 1025
      JWT_SECRET_KEY: "Yk8zYkwwNGtVa0JvbE1NSU5lS2dtODdIMWlITzA4cDlZSkRiaFhBZmE4TT0="
      ORGANIZATION_S3_CLIENT_URI: http://s3:9090

#  ubuntu:
#    image: michaelirey/ubuntu-with-tools:latest
#    restart: on-failure
#    command: sleep infinity

  postgres:
    image: postgres:17.5-alpine
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: local_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ../backend/schemas/local/postgres:/docker-entrypoint-initdb.d
      - ./postgres_data:/var/lib/postgresql/data

  flyway:
    image: flyway/flyway:12.0.0-alpine
    command: -configFiles=/flyway/conf/flyway.config -locations=filesystem:/flyway/sql -schemas=local_schema -connectRetries=60 migrate
    volumes:
      - ../backend/schemas/migrations:/flyway/sql
      - ../backend/schemas/local/flyway:/flyway/conf
    depends_on:
      - postgres

  waha:
    hostname: waha
    image: devlikeapro/waha-plus:gows-arm
    restart: unless-stopped
    ports:
      - "3000:3000"
    logging:
      driver: 'json-file'
      options:
        max-size: '100m'
        max-file: '10'
    env_file: waha-data/waha-env
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      - WHATSAPP_SESSIONS_POSTGRESQL_URL=postgres://postgres:postgres@postgres:5432/local_db?sslmode=disable

  mailhog:
    image: mailhog/mailhog:v1.0.1
    restart: always
    ports:
      - "1025:1025"
      - "8025:8025"

  wiremock:
    image: local/wiremock:latest
    #    ports:
    #      - "8080:8080"

  s3:
    image: adobe/s3mock:5.0.0
    restart: always
    ports:
      - "9090:9090" # HTTP port
    environment:
      - COM_ADOBE_TESTING_S3MOCK_STORE_INITIAL_BUCKETS=organization-logo-bucket
      - COM_ADOBE_TESTING_S3MOCK_STORE_RETAIN_FILES_ON_EXIT=true