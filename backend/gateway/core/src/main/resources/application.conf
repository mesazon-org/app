gateway-api {
  server {
    external {
      host = "0.0.0.0"
      host = ${?SERVER_EXTERNAL_HOST}
      port = 8080
      port = ${?SERVER_EXTERNAL_PORT}
    }
    internal {
      host = "0.0.0.0"
      host = ${?SERVER_INTERNAL_HOST}
      port = 8081
      port = ${?SERVER_INTERNAL_PORT}
    }
    health {
      host = "0.0.0.0"
      host = ${?SERVER_HEALTH_HOST}
      port = 8082
      port = ${?SERVER_HEALTH_PORT}
    }

    enable-docs = false
    enable-docs = ${?SERVER_ENABLE_DOCS}
  }

  database {
    name = "local_db"
    name = ${?DATABASE_NAME}
    driver = "org.postgresql.Driver"
    driver = ${?DATABASE_DRIVER}
    host = "localhost"
    host = ${?DATABASE_HOST}
    port = 5432
    port = ${?DATABASE_PORT}
    username = ""
    username = ${?DATABASE_USERNAME}
    password = ""
    password = ${?DATABASE_PASSWORD}
    thread-pool-size = 10
    thread-pool-size = ${?DATABASE_THREAD_POOL_SIZE}
  }

  repository {
    schema = "local_schema"
    schema = ${?REPOSITORY_SCHEMA}
    user-details-table = "user_details"
    user-credentials-table = "user_credentials"
    user-otp-table = "user_otp"
    user-token-table = "user_token"
    waha-user-table = "waha_user"
    waha-user-activity-table = "waha_user_activity"
    waha-user-message-table = "waha_user_message"
  }

  validation {
    supported-phone-regions = ["CY"]
  }

  http-client {
    connection-timeout = 10 seconds
  }

  open-ai-client {
    api-key = ""
    api-key = ${?OPENAI_API_KEY}
  }

  replying-to-messages-cron-job {
    trigger-every-seconds = 2
    trigger-every-seconds = ${?REPLYING_TO_MESSAGES_CRON_JOB_TRIGGER_EVERY_SECONDS}

    last-update-offset-seconds = 8
    last-update-offset-seconds = ${?REPLYING_TO_MESSAGES_CRON_JOB_LAST_UPDATE_OFFSET_SECONDS}

    max-number-context-messages = 40
    max-number-context-messages = ${?REPLYING_TO_MESSAGES_CRON_JOB_MAX_NUMBER_CONTEXT_MESSAGES}
  }

  waha-client {
    scheme = "http"
    scheme = ${?WAHA_SCHEME}

    host = "waha"
    host = ${?WAHA_HOST}

    port = 3000
    port = ${?WAHA_PORT}

    api-key = ""
    api-key = ${?WAHA_API_KEY}

    words-per-minute = 10000

    human-delay-min = 4 seconds

    human-delay-max = 6 seconds
  }

  email {
    host = "localhost"
    host = ${?EMAIL_PROVIDER_HOST}

    port = 1025
    port = ${?EMAIL_PROVIDER_PORT}

    sender-email = "mesazon.dev@gmail.com"
    sender-email = ${?EMAIL_SENDER_EMAIL}

    sender-password = ""
    sender-password = ${?EMAIL_SENDER_PASSWORD}

    redirect-uri = "http://localhost:1025"
    redirect-uri = ${?EMAIL_REDIRECT_URI}

    enable-tls = false
    enable-tls = ${?EMAIL_ENABLE_TLS}
  }

  jwt {
    secret-key = "secret-key"
    secret-key = ${?JWT_SECRET_KEY}
    issuer = "https://mesazon.auth"
    access-token-expires-at-offset = 15 minutes
    access-token-expires-at-offset = ${?JWT_ACCESS_TOKEN_EXPIRES_AT_OFFSET}
    refresh-token-expires-at-offset = 30 days
    refresh-token-expires-at-offset = ${?JWT_REFRESH_TOKEN_EXPIRES_AT_OFFSET}
  }

  user-sign-up {
    otp-email-verification-expires-at-offset = 1 minute
    otp-email-verification-expires-at-offset = ${?USER_SIGNUP_OTP_EMAIL_VERIFICATION_EXPIRES_AT_OFFSET}
    otp-email-verification-resend-cooldown = 10 seconds
    otp-email-verification-resend-cooldown = ${?USER_SIGNUP_OTP_EMAIL_VERIFICATION_RESEND_COOLDOWN}
    send-email-verification-email-max-retries = 5
    send-email-verification-email-max-retries = ${?USER_SIGNUP_SEND_EMAIL_VERIFICATION_EMAIL_MAX_RETRIES}
    send-email-verification-email-retry-delay = 100 milliseconds
    send-email-verification-email-retry-delay = ${?USER_SIGNUP_SEND_EMAIL_VERIFICATION_EMAIL_RETRY_DELAY}
  }

  password {
    salt-length = 16
    hash-length = 32
    parallelism = 1
    memory-kb = 65536
    iterations = 3
  }

  user-onboard {
    otp-phone-verification-expires-at-offset = 3 minute
    otp-phone-verification-expires-at-offset = ${?USER_ONBOARD_OTP_PHONE_VERIFICATION_EXPIRES_AT_OFFSET}
    otp-phone-verification-resend-cooldown = 30 seconds
    otp-phone-verification-resend-cooldown = ${?USER_ONBOARD_OTP_PHONE_VERIFICATION_RESEND_COOLDOWN}
    send-welcome-email-max-retries = 5
    send-welcome-email-max-retries = ${?USER_ONBOARD_SEND_WELCOME_EMAIL_MAX_RETRIES}
    send-welcome-email-retry-delay = 100 milliseconds
    send-welcome-email-retry-delay = ${?USER_ONBOARD_SEND_WELCOME_EMAIL_RETRY_DELAY}
    send-phone-verification-otp-max-retries = 3
    send-phone-verification-otp-max-retries = ${?USER_ONBOARD_SEND_PHONE_VERIFICATION_OTP_MAX_RETRIES}
    send-phone-verification-otp-retry-delay = 100 milliseconds
    send-phone-verification-otp-retry-delay = ${?USER_ONBOARD_SEND_PHONE_VERIFICATION_OTP_RETRY_DELAY}
  }

  twilio-client {
    scheme = "http"
    scheme = ${?TWILIO_CLIENT_SCHEME}
    host = "localhost"
    host = ${?TWILIO_CLIENT_HOST}
    port = 8080
    port = ${?TWILIO_CLIENT_PORT}
    account-sid = "account-sid"
    account-sid = ${?TWILIO_CLIENT_ACCOUNT_SID}
    auth-token = "auth-token"
    auth-token = ${?TWILIO_CLIENT_AUTH_TOKEN}
    company-name = "Mesazon"
    company-name = ${?TWILIO_CLIENT_COMPANY_NAME}
  }
}
